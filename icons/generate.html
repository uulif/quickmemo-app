<!DOCTYPE html>
<html>
<head><title>Generate PWA Icons</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<div id="links"></div>
<script>
function draw(canvas, size) {
  const ctx = canvas.getContext('2d');
  // Background
  ctx.fillStyle = '#1a73e8';
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, size * 0.2);
  ctx.fill();
  // Pencil icon
  const s = size / 24;
  ctx.save();
  ctx.translate(size * 0.2, size * 0.15);
  ctx.scale(s * 0.6, s * 0.6);
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  // Notepad shape
  ctx.roundRect(2, 2, 32, 36, 3);
  ctx.fill();
  ctx.fillStyle = '#1a73e8';
  // Lines on notepad
  for (let i = 0; i < 4; i++) {
    ctx.fillRect(7, 10 + i * 7, 22, 2);
  }
  ctx.restore();
  // "Q" letter
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${size * 0.38}px -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Q', size * 0.5, size * 0.52);
}
draw(document.getElementById('c192'), 192);
draw(document.getElementById('c512'), 512);

const links = document.getElementById('links');
[{id:'c192', name:'icon-192.png'}, {id:'c512', name:'icon-512.png'}].forEach(({id, name}) => {
  const a = document.createElement('a');
  a.href = document.getElementById(id).toDataURL('image/png');
  a.download = name;
  a.textContent = name + ' をダウンロード';
  a.style.display = 'block';
  a.style.margin = '10px';
  a.style.fontSize = '20px';
  links.appendChild(a);
});
</script>
</body>
</html>
